# GitHub Actions: CI (PR 触发)
#
# 跑测试套件 + 覆盖率检查。
# 跨平台矩阵:ubuntu / windows / macOS。

name: ci

on:
  pull_request:
    branches: [main, master]
  push:
    branches: [main, master]
  workflow_dispatch:

# 取消同一分支上正在跑的旧 run
concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  test:
    name: test (${{ matrix.os }})
    runs-on: ${{ matrix.os }}
    strategy:
      fail-fast: false           # 一个平台失败不阻塞其它平台
      matrix:
        os: [ubuntu-latest, windows-latest, macos-latest]
        python-version: ["3.8"]   # Win7 兼容下限

    defaults:
      run:
        # 关键:所有 conda run 命令必须在此目录(有 pyproject.toml)
        working-directory: inp_tool

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup conda
        uses: conda-incubator/setup-miniconda@v3
        with:
          miniconda-version: latest
          auto-activate-base: false
          activate-environment: cfdchanger
          environment-file: environment.yml
          python-version: ${{ matrix.python-version }}
          use-mamba: true

      - name: Install inp-tool (editable + dev + api deps)
        shell: bash -l {0}
        # v0.4.2: 装全套 extras,代替 environment.yml 里 conda 装的重复项(单一来源:pyproject.toml)
        run: |
          conda run -n cfdchanger pip install -e ".[dev,api,yaml,build]"

      - name: Run tests + coverage
        shell: bash -l {0}
        # v0.4.2: Windows cp1252 默认编码遇到中文/unicode 字符会抛 UnicodeEncodeError
        # conda run 捕获 pytest stdout 后用 print 输出到 GitHub runner 终端,
        # 触发 cp1252 encode 失败。设 PYTHONIOENCODING=utf-8 让 pytest/cov 输出 utf-8
        env:
          PYTHONIOENCODING: utf-8
        run: |
          conda run -n cfdchanger python -m pytest tests/ -v --tb=short \
            --cov=inp_tool --cov-report=term --cov-fail-under=80

      - name: REPL smoke test
        shell: bash -l {0}
        # v0.5.0: 非交互式跑 REPL 验证 shell 子命令 + load/set/status/undo 链路。
        # stdin 重定向到 tests/data/repl_smoke.txt(load → files → set → status →
        # undo → files → exit)。默认 working-directory: inp_tool,所以 tests/data/
        # 路径就是相对的;无需显式 cd。
        env:
          PYTHONIOENCODING: utf-8
        run: |
          conda run -n cfdchanger python -m inp_tool.cli shell < tests/data/repl_smoke.txt

      - name: Generate coverage HTML (ubuntu only)
        if: matrix.os == 'ubuntu-latest' && matrix.python-version == '3.8'
        shell: bash -l {0}
        run: |
          conda run -n cfdchanger python -m coverage html -d htmlcov
      - uses: actions/upload-artifact@v4
        if: matrix.os == 'ubuntu-latest' && matrix.python-version == '3.8'
        with:
          name: coverage-html
          path: inp_tool/htmlcov/
          retention-days: 14
          if-no-files-found: ignore
