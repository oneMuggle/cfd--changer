# GitHub Actions: Release (tag 触发)
#
# 流程:
#   1) 跑测试(确认绿)
#   2) 在 3 平台跑 PyInstaller 出二进制
#   3) 改名带版本号
#   4) 创建/更新 GitHub Release,上传 artifact
#
# 触发方式:git tag push v0.4.0 && git push --tags
#
# (PyInstaller 不支持交叉编译,必须在目标平台各编一次)

name: release

on:
  push:
    tags:
      - "v*"           # 任意 v 开头的 tag(v0.4.0 / v0.4.1 / ...)
  workflow_dispatch:    # 也允许手动触发

# 权限:让 GITHUB_TOKEN 能创建 release
permissions:
  contents: write

jobs:
  # ========== 测试(可选,先保证绿) ==========
  test:
    name: pre-release test (${{ matrix.os }})
    runs-on: ${{ matrix.os }}
    strategy:
      fail-fast: true
      matrix:
        os: [ubuntu-latest, windows-latest, macos-latest]

    defaults:
      run:
        working-directory: inp_tool

    steps:
      - uses: actions/checkout@v4
      - uses: conda-incubator/setup-miniconda@v3
        with:
          miniconda-version: latest
          activate-environment: cfdchanger
          environment-file: environment.yml
          python-version: "3.8"
          use-mamba: true
      - name: Install + test
        shell: bash -l {0}
        # v0.4.2: Windows cp1252 默认编码遇到中文/unicode 字符会抛 UnicodeEncodeError
        # conda run 捕获 pytest stdout 后用 print 输出到 GitHub runner 终端,
        # 触发 cp1252 encode 失败。设 PYTHONIOENCODING=utf-8 让 pytest 输出 utf-8
        # v0.4.2: 装全套 extras(包含 [build] 里的 pyinstaller 6.16.0),代替 environment.yml 里
        # conda 装的重复项 + 单独的 pyinstaller 行(单一来源:pyproject.toml)
        # fix/release-macos-gui-skip: macOS(Apple Silicon M1/M2)runner 上 PySide2 5.15.2.1
        # 没有 arm64 wheel,装 [gui] extras 必爆;同时跳过全部 test_gui_*.py(offscreen 平台
        # 依赖 PySide2)。与 ci.yml 的 macOS 分支对齐(PR #23 commit 74107c0 + d9f3455)。
        # 此前 v0.12.0 / v0.13.0 tag 触发 release.yml 时因这一处遗漏而 macOS test 失败,
        # 整个 workflow skipped build + Release,导致无任何 artifact。
        env:
          PYTHONIOENCODING: utf-8
        run: |
          if [ "$RUNNER_OS" == "macOS" ]; then
            echo "macOS runner — skipping [gui] install (PySide2 5.15.2.1 无 arm64 wheel)"
            conda run -n cfdchanger pip install -e ".[dev,api,yaml,build]"
            conda run -n cfdchanger python -m pytest tests/ -v --tb=short \
              --ignore-glob='tests/test_gui_*.py'
          else
            conda run -n cfdchanger pip install -e ".[dev,api,yaml,build,gui]"
            conda run -n cfdchanger python -m pytest tests/ -v --tb=short
          fi

  # ========== 跨平台打包 ==========
  build:
    name: build (${{ matrix.os }})
    needs: test
    runs-on: ${{ matrix.os }}
    strategy:
      fail-fast: false
      matrix:
        include:
          - os: ubuntu-latest
            artifact_name: inp-tool-linux-x86_64
            binary_name: inp-tool
          - os: windows-latest
            artifact_name: inp-tool-windows-x86_64.exe
            binary_name: inp-tool.exe
          - os: macos-latest
            artifact_name: inp-tool-macos-universal2
            binary_name: inp-tool

    defaults:
      run:
        working-directory: inp_tool

    steps:
      - uses: actions/checkout@v4

      - uses: conda-incubator/setup-miniconda@v3
        with:
          miniconda-version: latest
          activate-environment: cfdchanger
          environment-file: environment.yml
          python-version: "3.8"
          use-mamba: true

      - name: Install pyinstaller (build dep)
        shell: bash -l {0}
        # v0.4.2: 装 [build] extra(包含 pyinstaller==6.16.0);单一来源:pyproject.toml
        # v0.8.3: 同时装 [api] 和 [yaml] — standalone binary 必须 self-contain 运行时
        # 依赖(否则 PyInstaller 在 Analysis 阶段找不到 yaml/fastapi 等模块,
        # 导致运行时 ModuleNotFoundError,即使 spec hiddenimports 列了)
        env:
          PYTHONIOENCODING: utf-8
        run: |
          conda run -n cfdchanger pip install -e ".[api,yaml,build]"

      - name: Build standalone (PyInstaller)
        shell: bash -l {0}
        run: |
          if [ "$RUNNER_OS" == "Windows" ]; then
              # Windows:Git Bash 不能直接跑 .bat,用 python 调 (cwd 已是 inp_tool/)
              python -c "import PyInstaller.__main__ as m; m.run(['inp_tool.spec','--clean','--noconfirm'])"
          else
              # Linux/macOS: scripts/ 在仓库根,cwd 是 inp_tool/,需 ../
              bash ../scripts/build.sh
          fi

      - name: Smoke test (${{ matrix.binary_name }})
        shell: bash -l {0}
        run: |
          if [ "$RUNNER_OS" == "Windows" ]; then
              ./dist/inp-tool.exe --version
          else
              ./dist/inp-tool --version
              ./dist/inp-tool --help | head -3
          fi

      - name: Upload build artifact
        uses: actions/upload-artifact@v4
        with:
          name: ${{ matrix.artifact_name }}
          path: inp_tool/dist/${{ matrix.binary_name }}
          if-no-files-found: error
          retention-days: 90

  # ========== 创建 GitHub Release ==========
  release:
    name: GitHub Release
    needs: build
    runs-on: ubuntu-latest
    steps:
      - uses: actions/download-artifact@v4
        with:
          path: artifacts/

      - name: Rename binaries to platform-suffixed names
        # v0.4.2: softprops/action-gh-release@v2 不支持 path#name 重命名语法,
        # 用 cp 在 release 前给 linux/macos 二进制加平台后缀,避免 basename 'inp-tool' 冲突
        # (Windows 的 inp-tool.exe 已经天然 unique)
        shell: bash
        run: |
          cp artifacts/inp-tool-linux-x86_64/inp-tool artifacts/inp-tool-linux-x86_64/inp-tool-linux-x86_64
          cp artifacts/inp-tool-macos-universal2/inp-tool artifacts/inp-tool-macos-universal2/inp-tool-macos-universal2

      - name: Display collected artifacts
        run: |
          echo "=== artifacts/ ==="
          ls -la artifacts/
          echo ""
          echo "=== sizes ==="
          du -h artifacts/*/* 2>/dev/null || du -h artifacts/

      - name: Create / update GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          tag_name: ${{ github.ref_name }}
          name: inp-tool ${{ github.ref_name }}
          draft: true              # 草稿,人工 review 后再 publish
          prerelease: ${{ contains(github.ref_name, 'rc') || contains(github.ref_name, 'alpha') || contains(github.ref_name, 'beta') }}
          generate_release_notes: true
          fail_on_unmatched_files: true
          # v0.4.2: 精确列举 3 个平台 binary(已 cp 重命名为 unique 名,避免 'inp-tool' 冲突)
          files: |
            artifacts/inp-tool-linux-x86_64/inp-tool-linux-x86_64
            artifacts/inp-tool-macos-universal2/inp-tool-macos-universal2
            artifacts/inp-tool-windows-x86_64.exe/inp-tool.exe
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
